services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./models/artifacts:/artifacts:ro
    environment:
      MODEL_ARTIFACTS_DIR: /artifacts
      DEFAULT_MODEL: ${DEFAULT_MODEL:-v5}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
